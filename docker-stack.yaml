services:
  minio:
    image: quay.io/minio/aistor/minio:latest
    command: minio server /mnt/data --license /minio.license
    volumes:
      - minio-data:/mnt/data
      - minio-certs:/etc/minio/certs
    secrets:
      - source: MINIO_LICENSE
        target: /minio.license
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      placement:
        constraints:
          - node.hostname == ${MINIO_NODE_HOSTNAME}
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=swarm-net"
        - "traefik.http.routers.minio-api.rule=Host(`${MINIO_API_HOSTNAME}`)"
        - "traefik.http.routers.minio-api.entrypoints=websecure"
        - "traefik.http.routers.minio-api.service=minio-api"
        - "traefik.http.routers.minio-api.tls=true"
        - "traefik.http.services.minio-api.loadbalancer.server.port=9000"
        - "traefik.http.services.minio-api.loadbalancer.server.scheme=http"
        - "traefik.http.routers.minio-server.rule=Host(`${MINIO_SERVER_HOSTNAME}`)"
        - "traefik.http.routers.minio-server.entrypoints=websecure"
        - "traefik.http.routers.minio-server.service=minio-server"
        - "traefik.http.routers.minio-server.tls=true"
        - "traefik.http.services.minio-server.loadbalancer.server.port=9001"
        - "traefik.http.services.minio-server.loadbalancer.server.scheme=http"
    environment:
      MINIO_ADDRESS: ":9000"
      MINIO_CONSOLE_ADDRESS: ":9001"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SERVER_HOSTNAME: ${MINIO_SERVER_HOSTNAME}
      MINIO_API_HOSTNAME: ${MINIO_API_HOSTNAME}
      MINIO_NODE_HOSTNAME: ${MINIO_NODE_HOSTNAME}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL}
      MINIO_COMPRESSION_ENABLE: ${MINIO_COMPRESSION_ENABLE}
      MINIO_SITE_NAME: ${MINIO_SITE_NAME}
    networks:
      - swarm-net

networks:
  swarm-net:
    external: true

volumes:
  minio-data:
    driver: local
  minio-certs:
    driver: local

secrets:
  MINIO_LICENSE:
    name: MINIO_LICENSE
    file: ./minio/minio.license
